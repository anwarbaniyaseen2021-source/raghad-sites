<div class="gallery-slider">

  <div class="slides-wrapper">

    <div class="slide"><img src="https://images.unsplash.com/photo-1537151625747-768eb6cf92b2" alt="Dog running" data-i18n-alt="gallery.alt2"></div>

    <div class="slide"><img src="https://images.unsplash.com/photo-1558788353-f76d92427f16" alt="Happy dog" data-i18n-alt="gallery.alt4"></div>

    <button class="util-btn" type="button" id="zoomIn" aria-label="Zoom in" data-i18n-aria-label="zoom.in">A+</button>
    <button class="util-btn" type="button" data-theme="day" data-i18n="util.day">Day</button>
    <button class="util-btn" type="button" data-theme="night" data-i18n="util.night">Night</button>
    <button class="util-btn" type="button" data-lang="ar" data-i18n="util.ar">العربية</button>
